server:
  port: 8081

spring:
  application:
    name: hospital-management-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_db
    username: postgres
    password: arun@123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# Security Configuration
hospital:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000 # 24 hours
  upload:
    path: ./uploads/doctors
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX}
    auth-token: ${TWILIO_AUTH_TOKEN:your_auth_token_here}
    from-number: ${TWILIO_FROM_NUMBER:+1234567890}

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.hospital: DEBUG
